<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flappy Bird — Gesture Arcade</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; }
    canvas {
      display: block;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }
    .back-btn {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 100;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.25);
      background: rgba(0,0,0,0.45);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
      text-decoration: none;
    }
    .back-btn:hover {
      background: rgba(0,0,0,0.7);
      border-color: rgba(255,255,255,0.5);
    }
    .back-btn svg {
      width: 20px;
      height: 20px;
      fill: rgba(255,255,255,0.8);
    }

    /* ---- Lobby overlay ---- */
    #lobby-ui {
      display: none; /* shown by JS on init */
      position: fixed;
      inset: 0;
      z-index: 200;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.72);
      backdrop-filter: blur(6px);
    }

    .lobby-card {
      background: rgba(20, 30, 48, 0.95);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 16px;
      padding: 32px 28px;
      width: min(340px, 90vw);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      color: #fff;
      font-family: sans-serif;
    }

    .lobby-title {
      font-size: 22px;
      font-weight: bold;
      letter-spacing: 0.5px;
    }

    .mp-section {
      width: 100%;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    /* Sections hidden by default; JS shows the active one */
    .mp-section { display: none; }

    .btn {
      width: 100%;
      padding: 13px 0;
      border-radius: 10px;
      border: none;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn:active { transform: scale(0.97); }

    .btn-primary {
      background: #F7DC6F;
      color: #1a1a1a;
    }
    .btn-secondary {
      background: #5DADE2;
      color: #fff;
    }
    .btn-ghost {
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.7);
      border: 1px solid rgba(255,255,255,0.15);
      font-size: 14px;
      padding: 10px 0;
    }
    .btn:hover { opacity: 0.88; }

    .code-display {
      font-size: 42px;
      font-weight: bold;
      letter-spacing: 10px;
      color: #F7DC6F;
      text-align: center;
      padding: 6px 0;
    }

    .status-text {
      font-size: 14px;
      color: rgba(255,255,255,0.65);
      text-align: center;
    }

    .code-input {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.07);
      color: #fff;
      font-size: 28px;
      font-weight: bold;
      letter-spacing: 8px;
      text-align: center;
      text-transform: uppercase;
      outline: none;
    }
    .code-input::placeholder {
      color: rgba(255,255,255,0.25);
      font-size: 20px;
      letter-spacing: 4px;
    }
    .code-input:focus {
      border-color: rgba(255,255,255,0.45);
    }

    .error-text {
      font-size: 13px;
      color: #E74C3C;
      text-align: center;
      min-height: 18px;
    }

    /* ---- MP Game Over overlay ---- */
    #mp-game-over {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 300;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(4px);
    }
  </style>
</head>
<body>
  <a class="back-btn" href="/hub/index.html" title="Back to Hub">
    <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
  </a>

  <canvas id="gameCanvas"></canvas>

  <!-- ===== Lobby overlay ===== -->
  <div id="lobby-ui">
    <div class="lobby-card">
      <div class="lobby-title">Flappy Bird</div>

      <!-- Main menu -->
      <div class="mp-section" id="mp-main">
        <button class="btn btn-primary" id="btn-solo">Solo Play</button>
        <button class="btn btn-secondary" id="btn-create">Create Game</button>
        <button class="btn btn-ghost" id="btn-join-section">Join Game</button>
        <div class="error-text" id="mp-connect-error"></div>
      </div>

      <!-- Create room section -->
      <div class="mp-section" id="mp-create-section">
        <div class="status-text" id="mp-status">Connecting...</div>
        <div class="code-display" id="mp-code-display">...</div>
        <div class="status-text">Share this code with your opponent</div>
        <button class="btn btn-ghost" id="btn-back-create">Back</button>
      </div>

      <!-- Join room section -->
      <div class="mp-section" id="mp-join-section">
        <div class="status-text">Enter your opponent's code:</div>
        <input
          class="code-input"
          id="mp-code-input"
          type="text"
          maxlength="4"
          placeholder="KITE"
          autocomplete="off"
          spellcheck="false"
        />
        <div class="error-text" id="mp-join-error"></div>
        <button class="btn btn-primary" id="btn-join">Join Game</button>
        <button class="btn btn-ghost" id="btn-back-join">Back</button>
      </div>
    </div>

    <!-- Join vs Create choice (inside main section via buttons) -->
    <!-- Extra "Join" button on main screen -->
  </div>
  <!-- ===== MP Game Over overlay ===== -->
  <div id="mp-game-over">
    <div class="lobby-card">
      <div class="lobby-title">Game Over</div>
      <div class="status-text" id="mp-result-msg" style="font-size:16px;color:#fff;text-align:center;"></div>
      <button class="btn btn-primary" id="btn-play-again">Play Again</button>
      <button class="btn btn-ghost" id="btn-mp-quit">Main Menu</button>
    </div>
  </div>

  <script type="module" src="./game.js"></script>
</body>
</html>
