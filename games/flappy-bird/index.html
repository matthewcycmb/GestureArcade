<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flappy Bird — Gesture Arcade</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #0d1117; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    canvas {
      display: block;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }
    .back-btn {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 100;
      width: 40px;
      height: 40px;
      border-radius: 0;
      border: 2px solid rgba(88, 166, 255, 0.25);
      background: rgba(13, 17, 23, 0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.1s steps(2), border-color 0.1s steps(2);
      text-decoration: none;
    }
    .back-btn:hover {
      background: rgba(88, 166, 255, 0.15);
      border-color: #58a6ff;
      box-shadow: 0 0 8px rgba(88, 166, 255, 0.3);
    }
    .back-btn svg {
      width: 20px;
      height: 20px;
      fill: #58a6ff;
    }

    /* ---- Lobby overlay ---- */
    #lobby-ui {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 200;
      align-items: center;
      justify-content: center;
      background: rgba(13, 17, 23, 0.85);
    }

    .lobby-card {
      background: #161b22;
      border: 2px solid rgba(88, 166, 255, 0.25);
      border-radius: 0;
      padding: 36px 28px;
      width: min(340px, 90vw);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      color: #fff;
      box-shadow: 0 0 20px rgba(88, 166, 255, 0.15);
    }

    .lobby-title {
      font-family: 'Press Start 2P', monospace;
      font-size: 16px;
      font-weight: 400;
      letter-spacing: 2px;
      color: #58a6ff;
      text-shadow: 0 0 12px rgba(88, 166, 255, 0.4);
    }

    .mp-section {
      width: 100%;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    .mp-section { display: none; }

    .btn {
      width: 100%;
      padding: 14px 0;
      border-radius: 0;
      border: 2px solid transparent;
      font-family: 'Press Start 2P', monospace;
      font-size: 10px;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.1s steps(2);
    }
    .btn:active { transform: scale(0.97); }

    .btn-primary {
      background: #58a6ff;
      color: #0d1117;
      border-color: #58a6ff;
    }
    .btn-primary:hover {
      background: #79c0ff;
      border-color: #79c0ff;
      box-shadow: 0 0 12px rgba(88, 166, 255, 0.4);
    }
    .btn-secondary {
      background: rgba(88, 166, 255, 0.15);
      color: #58a6ff;
      border-color: rgba(88, 166, 255, 0.4);
    }
    .btn-secondary:hover {
      background: rgba(88, 166, 255, 0.25);
      border-color: #58a6ff;
      box-shadow: 0 0 10px rgba(88, 166, 255, 0.3);
    }
    .btn-ghost {
      background: transparent;
      color: rgba(255,255,255,0.5);
      border: 2px solid rgba(255,255,255,0.15);
      font-size: 9px;
      padding: 11px 0;
    }
    .btn-ghost:hover {
      color: rgba(255,255,255,0.8);
      border-color: rgba(255,255,255,0.3);
    }

    .code-display {
      font-family: 'Press Start 2P', monospace;
      font-size: 28px;
      letter-spacing: 10px;
      color: #58a6ff;
      text-shadow: 0 0 16px rgba(88, 166, 255, 0.5);
      text-align: center;
      padding: 6px 0;
    }

    .status-text {
      font-size: 13px;
      color: rgba(255,255,255,0.5);
      text-align: center;
    }

    .code-input {
      width: 100%;
      padding: 12px;
      border-radius: 0;
      border: 2px solid rgba(88, 166, 255, 0.25);
      background: rgba(88, 166, 255, 0.06);
      color: #fff;
      font-family: 'Press Start 2P', monospace;
      font-size: 20px;
      letter-spacing: 8px;
      text-align: center;
      text-transform: uppercase;
      outline: none;
    }
    .code-input::placeholder {
      color: rgba(255,255,255,0.2);
      font-size: 14px;
      letter-spacing: 4px;
    }
    .code-input:focus {
      border-color: #58a6ff;
      box-shadow: 0 0 8px rgba(88, 166, 255, 0.3);
    }

    .error-text {
      font-size: 12px;
      color: #f85149;
      text-align: center;
      min-height: 18px;
    }

    /* ---- MP Game Over overlay ---- */
    #mp-game-over {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 300;
      align-items: center;
      justify-content: center;
      background: rgba(13, 17, 23, 0.8);
    }
  </style>
</head>
<body>
  <a class="back-btn" href="/hub/index.html" title="Back to Hub">
    <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
  </a>

  <canvas id="gameCanvas"></canvas>

  <!-- ===== Lobby overlay ===== -->
  <div id="lobby-ui">
    <div class="lobby-card">
      <div class="lobby-title">FLAPPY BIRD</div>

      <!-- Main menu -->
      <div class="mp-section" id="mp-main">
        <button class="btn btn-primary" id="btn-solo">Solo Play</button>
        <button class="btn btn-secondary" id="btn-create">Create Game</button>
        <button class="btn btn-ghost" id="btn-join-section">Join Game</button>
        <div class="error-text" id="mp-connect-error"></div>
      </div>

      <!-- Create room section -->
      <div class="mp-section" id="mp-create-section">
        <div class="status-text" id="mp-status">Connecting...</div>
        <div class="code-display" id="mp-code-display">...</div>
        <div class="status-text">Share this code with your opponent</div>
        <button class="btn btn-ghost" id="btn-back-create">Back</button>
      </div>

      <!-- Join room section -->
      <div class="mp-section" id="mp-join-section">
        <div class="status-text">Enter your opponent's code:</div>
        <input
          class="code-input"
          id="mp-code-input"
          type="text"
          maxlength="4"
          placeholder="KITE"
          autocomplete="off"
          spellcheck="false"
        />
        <div class="error-text" id="mp-join-error"></div>
        <button class="btn btn-primary" id="btn-join">Join Game</button>
        <button class="btn btn-ghost" id="btn-back-join">Back</button>
      </div>
    </div>

    <!-- Join vs Create choice (inside main section via buttons) -->
    <!-- Extra "Join" button on main screen -->
  </div>
  <!-- ===== MP Game Over overlay ===== -->
  <div id="mp-game-over">
    <div class="lobby-card">
      <div class="lobby-title">GAME OVER</div>
      <div class="status-text" id="mp-result-msg" style="font-size:16px;color:#fff;text-align:center;"></div>
      <button class="btn btn-primary" id="btn-play-again">Play Again</button>
      <button class="btn btn-ghost" id="btn-mp-quit">Main Menu</button>
    </div>
  </div>

  <script type="module" src="./game.js"></script>
</body>
</html>
